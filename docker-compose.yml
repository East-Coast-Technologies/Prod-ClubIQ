services:
  ############################################################
  # Services with Dockerfiles
  ############################################################

  # Backend Service
  backend:
    build: ./Backend
    container_name: clubiq-backend
    restart: unless-stopped
    env_file:
      - ./Backend/backend.env
    volumes:
      - ./Backend:/app
    networks:
      - clubiq-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:5000/api/backend-health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Frontend Service
  frontend:
    build: ./Frontend
    container_name: clubiq-frontend
    restart: unless-stopped
    env_file:
      - ./Frontend/frontend.env
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    networks:
      - clubiq-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --spider http://localhost:3000/frontend-health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ############################################################
  # Services with only images
  ############################################################

  # Database
  postgres:
    image: postgres:16
    container_name: clubiq-db
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - clubiq-network
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h localhost || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: clubiq-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - clubiq-network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --spider http://localhost/nginx-health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

############################################################
# Volumes and Networks
############################################################

# Persistent Volumes
volumes:
  postgres-data:

# Internal Docker Network
networks:
  clubiq-network:
    driver: bridge
